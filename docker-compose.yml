version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: zolara_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zolara
      POSTGRES_PASSWORD: zolara_dev_pass
      POSTGRES_DB: zolara_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zolara -d zolara_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zolara_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zolara_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://zolara:zolara_dev_pass@postgres:5432/zolara_dev
      REDIS_URL: redis://redis:6379
      MANAGER_BOT_TOKEN: ${MANAGER_BOT_TOKEN}
      WEBHOOK_BASE_URL: ${WEBHOOK_BASE_URL:-http://localhost:3000}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-zolara_dev_secret_change_in_prod}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_GROUP_ID: ${MINIMAX_GROUP_ID:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
